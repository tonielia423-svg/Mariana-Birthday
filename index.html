<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariana ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ===== INTRO ===== */
#introScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#introText{
font-size:28px;
opacity:0;
animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
to {opacity:1;}
}

/* ===== STARS ===== */
#stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
background:black;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* ===== STEPS SYSTEM ===== */
.step{
position:absolute;
width:100%;
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
pointer-events:none;
}

.step.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

/* ===== BUTTON ===== */
button{
margin-top:25px;
padding:12px 24px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:#ff4f8b;
color:white;
}

/* ===== TEXT ===== */
.message{
font-size:28px;
line-height:1.8;
}

.small{
font-size:22px;
line-height:1.8;
margin-top:20px;
}

/* ===== HEARTS ===== */
.heart{
position:fixed;
font-size:24px;
animation:floatUp 6s linear forwards;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
  <div id="introText">مساء الخير ماريانا ❤️</div>
</div>

<div id="stars"></div>

<div class="container">

<div id="step1" class="step active">
<div class="message">
مساء الخير ماريانا يا احلى وردة بهالكون ❤️
</div>
<button onclick="nextStep(2)">اضغطي هون 😊</button>
</div>

<div id="step2" class="step">
<div id="timer"></div>
<div class="small">
هل سنين كلها يوم عن يوم و دقيقة عن دقيقة حبك بئلبي كل يوم بزيد ❤️
</div>
<button onclick="nextStep(3)">كملي 😘</button>
</div>

<div id="step3" class="step">
<div class="small">
هاد يوم مميز و مهم عندي كتير يوم ميلادك يا نبض ئلبي ❤️
</div>
<button onclick="nextStep(4)">ولسا في شي 😊</button>
</div>

<div id="step4" class="step">
<div class="message">
وجودك بحياتي خلا الها معنى ❤️
</div>
<div style="margin-top:30px;font-size:30px;">❤️ ماريانا ❤️</div>
<div>🎂 26 🎂</div>
</div>

</div>

<audio id="music" loop>
<source src="music.m4a" type="audio/mp4">
</audio>

<script>

/* STARS */
for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.width=(Math.random()*3)+"px";
star.style.height=star.style.width;
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
document.getElementById("stars").appendChild(star);
}

/* INTRO REMOVE */
window.onload = ()=>{
setTimeout(()=>{
document.getElementById("introScreen").style.opacity="0";
setTimeout(()=>{
document.getElementById("introScreen").remove();
},1200);
},2000);
};

/* NAVIGATION FIX */
function nextStep(step){

document.querySelectorAll(".step").forEach(el=>{
el.classList.remove("active");
});

document.getElementById("step"+step).classList.add("active");

if(step===2){
document.getElementById("music").play();
startHearts();
}
}

/* HEARTS */
function startHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},700);
}

/* TIMER */
const startDate=new Date("2024-01-14T00:00:00");

function updateTimer(){
const now=new Date();
const diff=now-startDate;
const days=Math.floor(diff/(1000*60*60*24));
const years=(days/365).toFixed(1);

document.getElementById("timer").innerHTML=
`❤️ من 14/01/2024 ❤️<br><br>${years} سنة<br>${days} يوم`;
}

setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
