<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mariana ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100vh;
width:100vw;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ===== INTRO ===== */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#bg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at top,#1a1a40,#000);
z-index:0;
}

#introText{
position:relative;
z-index:3;
font-size:22px;
padding:20px;
opacity:0;
animation:textIn 2.5s ease forwards;
text-align:center;
}

@keyframes textIn{
to{
opacity:1;
}
}

#introHearts{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
z-index:2;
overflow:hidden;
}

.introHeart{
position:absolute;
font-size:22px;
animation:floatUp 4s linear forwards;
opacity:0.9;
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(1);
opacity:1;
}
100%{
transform:translateY(-20vh) scale(1.3);
opacity:0;
}
}

/* ===== MAIN ===== */
.container{
padding:20px;
max-width:700px;
width:100%;
}

.step{
position:absolute;
width:100%;
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
pointer-events:none;
}

.step.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

button{
margin-top:25px;
padding:12px 24px;
font-size:16px;
border:none;
border-radius:25px;
cursor:pointer;
background:#ff4f8b;
color:white;
}

.message{
font-size:22px;
line-height:1.8;
}

.small{
font-size:18px;
line-height:1.8;
margin-top:20px;
}

/* hearts */
.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear forwards;
pointer-events:none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="bg"></div>
  <div id="introHearts"></div>

  <div id="introText">
    مساء الخير ماريانا يا احلى وردة بهالكون ❤️
  </div>
</div>

<!-- MAIN -->
<div class="container">

<div id="step1" class="step active">
<div class="message">
مساء الخير ماريانا يا احلى وردة بهالكون ❤️
</div>
<button onclick="nextStep(2)">ابدئي 😊</button>
</div>

<div id="step2" class="step">
<div class="small">حبك كل يوم بيكبر ❤️</div>
<button onclick="nextStep(3)">كملي 😘</button>
</div>

<div id="step3" class="step">
<div class="small">يوم ميلادك مميز ❤️</div>
<button onclick="nextStep(4)">التالي 😊</button>
</div>

<div id="step4" class="step">
<div class="message">كل عام وانتي بخير يا ماريانا ❤️</div>
</div>

</div>

<audio id="music" loop>
<source src="music.m4a" type="audio/mp4">
</audio>

<script>

/* INTRO HEARTS */
function startIntroHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="introHeart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
document.getElementById("introHearts").appendChild(h);
setTimeout(()=>h.remove(),4000);
},120);
}

/* REMOVE INTRO */
window.onload=()=>{
startIntroHearts();

setTimeout(()=>{
document.getElementById("intro").style.transition="opacity 2s ease";
document.getElementById("intro").style.opacity="0";

setTimeout(()=>{
document.getElementById("intro").remove();
},2000);

},4000);
};

/* NAVIGATION */
function nextStep(step){
document.querySelectorAll(".step").forEach(el=>{
el.classList.remove("active");
});

document.getElementById("step"+step).classList.add("active");

if(step===2){
document.getElementById("music").play();
startHearts();
}
}

/* MAIN HEARTS */
function startHearts(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},600);
}

</script>

</body>
</html>
