<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariana ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100vh;
width:100vw;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ===== STARS ===== */
#stars{
position:fixed;
inset:0;
z-index:-1;
background:black;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* ===== INTRO ===== */
#intro{
position:fixed;
inset:0;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#introBg{
position:absolute;
inset:0;
background:radial-gradient(circle at top,#2a2a6a,#000);
z-index:0;
}

#introHearts{
position:absolute;
inset:0;
z-index:3;
pointer-events:none;
}

#introText{
position:relative;
z-index:2;
font-size:24px;
opacity:0;
animation:fadeIn 2.5s ease forwards;
padding:20px;
}

@keyframes fadeIn{
to{opacity:1;}
}

.introHeart{
position:absolute;
font-size:22px;
animation:floatUp 4s linear forwards;
opacity:1;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-20vh);opacity:0;}
}

/* ===== MAIN ===== */
.container{
width:100%;
max-width:700px;
padding:20px;
}

.step{
position:absolute;
width:100%;
opacity:0;
transform:translateY(15px);
transition:0.6s ease;
pointer-events:none;
}

.step.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#ff4f8b;
color:white;
font-size:16px;
cursor:pointer;
}

.message{font-size:22px;line-height:1.8;}
.small{font-size:18px;line-height:1.8;margin-top:15px;}

.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear forwards;
}

#timer{
font-size:22px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- STARS -->
<div id="stars"></div>

<!-- INTRO -->
<div id="intro">
  <div id="introBg"></div>
  <div id="introHearts"></div>

  <div id="introText">
    مساء الخير ماريانا يا احلى وردة بهالكون ❤️
  </div>
</div>

<!-- MAIN -->
<div class="container">

<div id="step1" class="step active">
<div class="message">مساء الخير ماريانا يا احلى وردة بهالكون ❤️</div>
<button onclick="nextStep(2)">ابدئي 😊</button>
</div>

<div id="step2" class="step">
<div id="timer"></div>
<div class="small">حبك كل يوم بيكبر ❤️</div>
<button onclick="nextStep(3)">كملي 😘</button>
</div>

<div id="step3" class="step">
<div class="small">يوم ميلادك مميز ❤️</div>
<button onclick="nextStep(4)">التالي 😊</button>
</div>

<div id="step4" class="step">
<div class="message">كل عام وانتي بخير يا ماريانا ❤️</div>
</div>

</div>

<audio id="music" loop>
<source src="music.m4a" type="audio/mp4">
</audio>

<script>

/* ===== STARS ===== */
for(let i=0;i<120;i++){
const s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
document.getElementById("stars").appendChild(s);
}

/* ===== INTRO HEARTS ===== */
let introDone=false;

function startIntroHearts(){
const container=document.getElementById("introHearts");

const interval=setInterval(()=>{
if(introDone) return;

const h=document.createElement("div");
h.className="introHeart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";

container.appendChild(h);

setTimeout(()=>h.remove(),4000);
},60);

setTimeout(()=>{
introDone=true;
clearInterval(interval);

document.getElementById("intro").style.transition="opacity 2s ease";
document.getElementById("intro").style.opacity="0";

setTimeout(()=>{
document.getElementById("intro").remove();
},2000);

},4000);
}

window.onload=()=>{
startIntroHearts();
};

/* ===== STEPS ===== */
function nextStep(step){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");

if(step===2){
document.getElementById("music").play();
startHearts();
}
}

/* ===== HEARTS ===== */
function startHearts(){
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},600);
}

/* ===== REAL TIMER ===== */
const startDate=new Date("2024-01-14T00:00:00");

function updateTimer(){
const now=new Date();
const diff=now-startDate;

const seconds=Math.floor(diff/1000);
const minutes=Math.floor(seconds/60);
const hours=Math.floor(minutes/60);
const days=Math.floor(hours/24);

const years=(days/365).toFixed(2);

document.getElementById("timer").innerHTML=
`❤️ منذ 14/01/2024<br>${years} سنة<br>${days} يوم<br>${hours} ساعة<br>${minutes} دقيقة`;
}

setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
