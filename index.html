<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariana ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100vh;
width:100vw;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* ===== INTRO ===== */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#introBg{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at top,#1a1a40,#000);
z-index:0;
}

#introHearts{
position:absolute;
width:100%;
height:100%;
z-index:2;
}

#introText{
position:relative;
z-index:1;
font-size:24px;
opacity:0;
animation:fadeIn 2.5s ease forwards;
padding:20px;
}

@keyframes fadeIn{
to{opacity:1;}
}

.introHeart{
position:absolute;
font-size:22px;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-20vh);opacity:0;}
}

/* ===== MAIN ===== */
.container{
padding:20px;
max-width:700px;
width:100%;
}

.step{
position:absolute;
width:100%;
opacity:0;
transform:translateY(20px);
transition:0.6s ease;
pointer-events:none;
}

.step.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

button{
margin-top:25px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#ff4f8b;
color:white;
font-size:16px;
cursor:pointer;
}

.message{font-size:22px;line-height:1.8;}
.small{font-size:18px;line-height:1.8;margin-top:20px;}

.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear forwards;
}

#timer{
font-size:22px;
margin-top:15px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="introBg"></div>
  <div id="introHearts"></div>

  <div id="introText">
    مساء الخير ماريانا يا احلى وردة بهالكون ❤️
  </div>
</div>

<!-- MAIN -->
<div class="container">

<div id="step1" class="step active">
<div class="message">مساء الخير ماريانا يا احلى وردة بهالكون ❤️</div>
<button onclick="nextStep(2)">ابدئي 😊</button>
</div>

<div id="step2" class="step">
<div id="timer"></div>
<div class="small">حبك كل يوم بيكبر ❤️</div>
<button onclick="nextStep(3)">كملي 😘</button>
</div>

<div id="step3" class="step">
<div class="small">يوم ميلادك مميز ❤️</div>
<button onclick="nextStep(4)">التالي 😊</button>
</div>

<div id="step4" class="step">
<div class="message">كل عام وانتي بخير يا ماريانا ❤️</div>
</div>

</div>

<audio id="music" loop>
<source src="music.m4a" type="audio/mp4">
</audio>

<script>

/* ===== INTRO HEARTS ===== */
function startIntroHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="introHeart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
document.getElementById("introHearts").appendChild(h);
setTimeout(()=>h.remove(),4000);
},80);
}

/* REMOVE INTRO */
window.onload=()=>{

startIntroHearts();

setTimeout(()=>{
document.getElementById("intro").style.transition="opacity 2s ease";
document.getElementById("intro").style.opacity="0";
setTimeout(()=>document.getElementById("intro").remove(),2000);
},3500);
};

/* ===== STEPS ===== */
function nextStep(step){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+step).classList.add("active");

if(step===2){
document.getElementById("music").play();
startHearts();
}
}

/* ===== HEARTS ===== */
function startHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},600);
}

/* ===== REAL TIMER ===== */
const startDate=new Date("2024-01-14T00:00:00");

function updateTimer(){
const now=new Date();
const diff=now-startDate;

const days=Math.floor(diff/(1000*60*60*24));
const years=(days/365).toFixed(1);

document.getElementById("timer").innerHTML=
`❤️ منذ 14/01/2024<br><br>${years} سنة<br>${days} يوم`;
}

setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
